<!doctype html>
<!-- This single‑file static page provides a UI to search based on typed or selected bangs defined with json. When no bang is selected, simple string matching is used to offer specific site searches. -->
<html lang="en">
<head>
<meta name="color-scheme" content="light dark">
<meta charset="utf-8" />
<title>Simple Search</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; margin: 24px; }
.search-row { max-width:800px; display:flex; gap:8px; align-items:center; }
input[type="text"]{ flex:1; padding:10px; font-size:16px; }
button{ padding:10px 12px; }
.popup { border: 1px solid; z-index: 1000; }
.popup ul { list-style:none; margin:0; padding:0; max-height:240px; overflow:auto; }
.popup li { padding:8px 12px; border-bottom:1px solid #f1f1f1; cursor:pointer; display:flex; justify-content:space-between; }
.popup li.highlight { background: rgba(128,128,128,0.5); mix-blend-mode: difference; }
.hidden{ display:none; }
.container { position:relative; max-width:800px; }
</style>
</head>
<body>

<h1>Simple Search</h1>

<div class="container">
  <form id="searchForm" onsubmit="return handleSearch(event);">
    <div class="search-row">
      <input name="search" id="q" type="text" placeholder="Type a search or ! to see bangs (e.g. '!a headphones' or 'amazon headphones')"/>
      <button type="submit">Go</button>
      <a style="text-decoration: none; appearance: button; border: 1px; color: #7777;" href="?settings" title="Settings">☰</a>
    </div>
  </form>

  <div id="popup" class="popup hidden" role="listbox" aria-live="polite">
    <ul id="popupList"></ul>
  </div>
</div>

<script id="data-json" type="application/json">
{"version":6,"bangs":[{"keyword":"amazon","alias":"a","name":"Amazon.com","url":"https://www.amazon.com/s?k=%s"},{"name":"DuckDuckGo AI","keyword":"ai","url":"https://duckduckgo.com/?q=%s&ia=chat&bang=true","category":"ai"},{"keyword":"allrecipes","name":"allrecipes","url":"https://www.allrecipes.com/search?q=%s"},{"keyword":"allsides","name":"AllSides","url":"https://www.allsides.com/search/?q=%s"},{"keyword":"archive","name":"Archive.org","url":"https://archive.org/search?query=%s"},{"keyword":"bettycrocker","name":"Betty Crocker","url":"https://www.bettycrocker.com/search?term=%s"},{"keyword":"bing","url":"https://www.bing.com/search?q=%s"},{"keyword":"brave","url":"https://safe.search.brave.com/search?q=hi"},{"keyword":"dictionary","alias":"d","name":"The Free Dictionary","url":"https://www.thefreedictionary.com/%s","category":"dictionary"},{"keyword":"duckduckgo","alias":"ddg","name":"DuckDuckGo","url":"https://safe.duckduckgo.com/?q=%s","category":"search"},{"keyword":"ebay","alias":"e","url":"https://www.ebay.com/sch/i.html?_nkw=%s"},{"keyword":"ebrit","url":"https://www.britannica.com/search?query=%s","category":"encyclopedia"},{"keyword":"food","url":"https://www.food.com/search/%s","category":"food"},{"keyword":"google","alias":"g","url":"https://www.google.com/search?q=%s","category":"search"},{"keyword":"github","alias":"git","url":"https://github.com/search?q=%s"},{"keyword":"grok","url":"https://grok.com/?q=%s","category":"ai"},{"keyword":"grokipedia","url":"https://grokipedia.com/search?q=%s","category":"encyclopedia"},{"keyword":"homedepot","url":"https://www.homedepot.com/s/%s"},{"name":"DuckDuckGo images","keyword":"image","url":"https://safe.duckduckgo.com/?q=%s&ia=images&iax=images","category":"images"},{"name":"Brave images","keyword":"image","url":"https://safe.search.brave.com/images?q=%s","category":"images"},{"keyword":"libby","url":"https://libbyapp.com/library/reads/search/query-%s/page-1"},{"keyword":"makerworld","url":"https://makerworld.com/en/search/models?keyword=%s"},{"keyword":"maps","url":"https://www.google.com/maps/search/%s"},{"keyword":"perplexity","url":"https://www.perplexity.ai/?q=linux"},{"keyword":"pip","url":"https://pypi.org/search/?q=%s"},{"keyword":"printables","url":"https://www.printables.com/search/models?q=%d"},{"name":"GeeksForGeeks (python)","keyword":"python","url":"https://www.geeksforgeeks.org/search/?gq=python+%s"},{"name":"GeeksForGeeks (javascript)","keyword":"javascript","url":"https://www.geeksforgeeks.org/search/?gq=javascript+%s"},{"keyword":"seriouseats","url":"https://www.seriouseats.com/search?q=%s"},{"keyword":"simplyrecipes","url":"https://www.simplyrecipes.com/search?q=%s"},{"keyword":"space","url":"https://www.space.com/search?searchTerm=%s"},{"keyword":"stackexchange","url":"https://stackexchange.com/search?q=%s"},{"keyword":"stackoverflow","alias":"so","url":"https://stackoverflow.com/search?q=%s"},{"keyword":"thesaurus","url":"https://www.thesaurus.com/browse/%s"},{"keyword":"thing","url":"https://www.thingiverse.com/search?q=%s"},{"keyword":"tubi","url":"https://tubitv.com/search/%s"},{"keyword":"ups","url":"https://www.ups.com/track?tracknum=%s"},{"keyword":"usps","url":"https://tools.usps.com/go/TrackConfirmAction?qtc_tLabels1=%s"},{"keyword":"wolfram","alias":"wa","url":"https://www.wolframalpha.com/input/?i=%s","category":"calculate"},{"keyword":"youtube","alias":"yt","url":"https://www.youtube.com/results?search_query=%s","category":"videos"}]}
</script>

<script id="data-category-match-json" type="application/json">
[["^find ",["search"]],["^how many ",["calculate"]],["^what is a ",["encyclopedia","ai"]],["^(?:what|when|why|where|do|how) ", ["ai"]],["\\b(?:recipe)\\b",["food"]],["^(?:[a-z]{2,})",["dictionary","encyclopedia", "search", "ai"]]]
</script>

<script>
// Load default bangs from embedded JSON
const bangsJson = JSON.parse(document.getElementById('data-json').textContent);
// Override with user custom bangs from localStorage if present
const storedBangJson = localStorage.getItem('bangs');
if (storedBangJson) {
  try {
    const userBangs = JSON.parse(storedBangJson);
    if (Array.isArray(userBangs)) {
      bangsJson.bangs = userBangs;
    }
  } catch (e) {
    console.warn('Failed to parse stored bangs', e);
  }
}
const categoryMatchesJson = JSON.parse(document.getElementById('data-category-match-json').textContent);

function extractSiteName(url) {
  var name;
  try {
    const u = new URL(url);
    const parts = u.hostname.split('.');
    name = parts[parts.length - 2] || u.hostname;
  } catch (e) {
    name = url;
  }
  return (name && String(name[0]).toUpperCase() + String(name).slice(1).toLowerCase()) || "";
}

const bangs = bangsJson.bangs.map(e => {
  const alias = e.alias || e.keyword;
  const name = e.name || extractSiteName(e.url);
  return { alias: alias, keyword: e.keyword, url: e.url, name: name, category: e.category };
});

const bangIndex = Object.fromEntries(bangs.flatMap(e => {
  entries = [[ e.keyword, e ]];
  if (e.alias != e.keyword) { entries.push([ e.alias, e ]); }
  return entries;
}));

function buildUrl(template, q) {
  const encoded = encodeURIComponent(q);
  return template.includes('%s') ? template.replace('%s', encoded) : template;
}

const input = document.getElementById('q');
const popup = document.getElementById('popup');
const popupList = document.getElementById('popupList');
let visible = false;
let filtered = [];
let highlightIndex = 0;

function showPopup() {
  popup.classList.remove('hidden');
  visible = true;
}

function hidePopup() {
  popup.classList.add('hidden');
  visible = false;
  highlightIndex = -1;
  filtered = [];
}

function filterWithString(filter, search, exact=false, keys = ['alias', 'keyword', 'category']) {
  const f = filter.toLowerCase();
  filtered = [];
  for (const b of bangs) {
    for (const key of keys) {
      if ( exact && b[key] == f || b[key] && b[key].startsWith(f)) {
        filtered.push([b, b[key], search]);
        break;
      }
    }
  }
  return filtered;
}

function renderPopup(filtered) {
  popupList.innerHTML = '';
  if (filtered.length === 0) {
    const li = document.createElement('li');
    li.textContent = 'No bangs match';
    li.className = 'no-match';
    popupList.appendChild(li);
    highlightIndex = -1;
    return false;
  }
  highlightIndex = 0;
  for (const [i, e] of filtered.entries()) {
    const li = document.createElement('li');
    li.tabIndex = -1;
    li.dataset.index = i;
    li.innerHTML = `<span><strong>!${e[1]}</strong></span><span style="opacity:.7">${e[0].name}</span>`;
    li.addEventListener('click', () => { highlightIndex = i; if(updateHighlight(true, true) == false) { setTimeout(() => handleSearch()); }});
    popupList.appendChild(li);
  }
  updateHighlight(false);
  return true;
}

function updateHighlight(update, done = false) {
  Array.from(popupList.children).forEach((li, i) => {
    li.classList.toggle('highlight', i === highlightIndex);
  });
  if(update && highlightIndex >= 0) {
    return applyBangAtCursor(filtered[highlightIndex][0], done);
  }
  return false;
}

input.addEventListener('input', (e) => {
  const val = input.value;
  const cursor = input.selectionStart;
  const before = val.slice(0, cursor);
  // detect last token starting with "!"
  let m;
  if ((m = /(?<=^|\s)(![\w-]*)( ?)/.exec(before))) {
    renderPopup(filterWithString(m[1].slice(1).toLowerCase(), before.slice(0, m.index) + before.slice(m.index + m[1].length + m[2].length) + input.value.slice(cursor), m[2].length > 0));
    showPopup();
    positionPopup();
  } else if ((m = /^([\w]+)( ?)/.exec(before)) && renderPopup(filterWithString(m[1].toLowerCase(), before.slice(0, m.index) + before.slice(m.index + m[1].length + m[2].length) + input.value.slice(cursor), m[2].length > 0, ['keyword', 'category']))) {
    showPopup();
    positionPopup();
  } else {
    renderSuggestions(input.value);
  }
});

input.addEventListener('keydown', (e) => {
  if (!visible) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); if (filtered.length) { highlightIndex = Math.min(filtered.length-1, highlightIndex+1); updateHighlight(true); } }
  else if (e.key === 'ArrowUp') { e.preventDefault(); if (filtered.length) { highlightIndex = Math.max(0, highlightIndex-1); updateHighlight(true); } }
  else if (e.key === 'Enter') {
    // apply highlighted bang if popup visible and an item highlighted
    //if (highlightIndex >= 0 && filtered[highlightIndex]) {
    if (filtered.length > 0) {
      e.preventDefault();
      setTimeout(() => handleSearch());
    }
  } else if (e.key === 'Escape') {
    hidePopup();
  }
});

function positionPopup() {
  const rect = input.getBoundingClientRect();
  popup.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  popup.style.left = (rect.left + window.scrollX) + 'px';
  popup.style.width = rect.width + 'px';
}

/* Replace the bang token in the input with the selected bang keyword (keeping rest) and redirect */
function applyBangAtCursor(bang, done) {
  // replace the last !token in the input with '!alias' and submit
  const val = input.value;
  const cursor = input.selectionStart;
  const before = val.slice(0, cursor);
  const after = val.slice(cursor);
  const m = /(^|\s)(!([\w]+\s*)?)$/.exec(before);
  if (!m) {
    return false;
  }
  const prefix = before.slice(0, m.index + (m[1] ? 1 : 0)); // keep leading space if present
  const newVal = prefix + '!' + bang.alias + (after.startsWith(' ') ? after : (after ? ' ' + after : ''));
  input.value = newVal.trimStart();
  if(done) {
    input.value += ' ';
    input.focus();
  }
  return true;
}

function handleSearch(e) {
  if (e) e.preventDefault();
  const raw = input.value.trim();
  if (!raw) return false;
  return handleRawSearch(raw);
}

function handleRawSearch(raw) {
  if (filtered.length > 0) {
    let [ entry, key, q ] = filtered[highlightIndex >= 0 && highlightIndex < filtered.length ? highlightIndex : 0];
    const url = entry.url;
    const hasPlaceholder = url.includes('%s');
    const target = hasPlaceholder ? buildUrl(url, q) : url;
    window.location.href = target;
    return false;
  }
  if (!input.value) { input.value = raw; }

  renderSuggestions(raw);
  return false;
}

function renderSuggestions(rawQuery) {
  let categories = [];
  for(const c of categoryMatchesJson) {
    if (new RegExp(c[0], 'i').exec(rawQuery)) {
      categories = c[1];
      break;
    }
  }
  let entries = [];
  for (const c of categories) {
    for (const b of bangs.filter(e => e.category == c)) {
      entries.push([b, c, rawQuery]);
    }
  }
  if (entries.length) {
    filtered = entries;
    renderPopup(entries);
    showPopup();
    positionPopup();
  } else {
    hidePopup();
  }
}

// Settings page to edit bangs
function showSettingsPage() {
  document.body.innerHTML = '';
  const form = document.createElement('form');
  form.id = 'bangsForm';
  const table = document.createElement('table');
  const header = document.createElement('tr');
  ['Keyword','Alias','Name','URL','Category'].forEach(text=>{
    const th = document.createElement('th'); th.textContent = text; header.appendChild(th);
  });
  table.appendChild(header);
  bangs.forEach((b,i)=>{
    const row = document.createElement('tr');
    if(b.alias == b.keyword) { b['alias-default'] = b.alias; b.alias = ''; }
    if(b.name == extractSiteName(b.url)) { b['name-default'] = b.name; b.name = ''; }
    ['keyword','alias','name','url','category'].forEach(field=>{
      const td = document.createElement('td');
      const input = document.createElement('input');
      input.type = 'text';
      input.name = field;
      input.value = b[field] || '';
      if (b[field + '-default']) input.placeholder = b[field + '-default'];
      input.dataset.index = i;
      td.appendChild(input);
      row.appendChild(td);
    });
    const del = document.createElement('td');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = 'Delete';
    btn.onclick = () => { table.removeChild(row); };
    del.appendChild(btn);
    row.appendChild(del);
    table.appendChild(row);
  });
  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.textContent = 'Add Bang';
  addBtn.onclick = () => {
    const row = document.createElement('tr');
    ['keyword','alias','name','url','category'].forEach(field=>{
      const td = document.createElement('td');
      const input = document.createElement('input');
      input.type = 'text';
      input.name = field;
      td.appendChild(input);
      row.appendChild(td);
    });
    const del = document.createElement('td');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = 'Delete';
    btn.onclick = () => { table.removeChild(row); };
    del.appendChild(btn);
    row.appendChild(del);
    table.appendChild(row);
  };
  form.appendChild(table);
  form.appendChild(addBtn);
  const saveBtn = document.createElement('button');
  saveBtn.type = 'button';
  saveBtn.textContent = 'Save';
  saveBtn.onclick = () => {
    const newBangs = [];
    Array.from(table.querySelectorAll('tr')).slice(1).forEach(tr=>{
      const obj = {};
      tr.querySelectorAll('input').forEach(inp=>{ if(inp.value.length) obj[inp.name] = inp.value; });
      if (obj.keyword) newBangs.push(obj);
    });
    localStorage.setItem('bangs', JSON.stringify(newBangs));
    location.href = location.pathname;
  };
  form.appendChild(saveBtn);
  // Export button: download current bangs as JSON
  const exportBtn = document.createElement('button');
  exportBtn.type = 'button';
  exportBtn.textContent = 'Export JSON';
  exportBtn.onclick = () => {
    // Use stored bangs if present, otherwise fall back to default bangs
    const stored = localStorage.getItem('bangs');
    const data = stored ? stored : JSON.stringify(bangsJson.bangs, null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bangs.json';
    a.click();
    URL.revokeObjectURL(url);
  };
  form.appendChild(exportBtn);
  // Import button: load bangs from a JSON file
  const importBtn = document.createElement('button');
  importBtn.type = 'button';
  importBtn.textContent = 'Import JSON';
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.json';
  fileInput.style.display = 'none';
  fileInput.onchange = () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = e.target.result;
        const json = JSON.parse(data);
        if (!Array.isArray(json)) {
          alert('JSON must be an array of bangs');
          return;
        }
        localStorage.setItem('bangs', JSON.stringify(json));
        location.href = location.pathname;
      } catch (err) {
        alert('Failed to parse JSON');
      }
    };
    reader.readAsText(file);
  };
  importBtn.onclick = () => fileInput.click();
  form.appendChild(importBtn);
  form.appendChild(fileInput);
  document.body.appendChild(form);
}


/* Close popup when clicking outside */
document.addEventListener('click', (e) => {
  if (!popup.contains(e.target) && e.target !== input) hidePopup();
});

/* Reposition popup on resize/scroll */
window.addEventListener('resize', () => { if (visible) positionPopup(); });
window.addEventListener('scroll', () => { if (visible) positionPopup(); });

const query = new URLSearchParams(window.location.search);

if (query.has('q')) {
  handleRawSearch(query.get('q'));
}

// If settings requested, show settings page and stop further script
if (query.has('settings')) {
  showSettingsPage();
}

</script>
</body>
</html>
