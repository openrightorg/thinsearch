<!doctype html>
<!-- This single‑file static page provides a UI to search based on typed or selected bangs defined with json. When no bang is selected, simple string matching is used to offer specific site searches. -->
<html lang="en">
<head>
<meta name="color-scheme" content="light dark">
<meta charset="utf-8" />
<title>Simple Search</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; margin: 24px; }
.search-row { max-width:800px; display:flex; gap:8px; align-items:center; }
input[type="text"]{ flex:1; padding:10px; font-size:16px; }
button{ padding:10px 12px; }
.popup { border: 1px solid; z-index: 1000; }
.popup ul { list-style:none; margin:0; padding:0; max-height:240px; overflow:auto; }
.popup li { padding:8px 12px; border-bottom:1px solid #f1f1f1; cursor:pointer; display:flex; justify-content:space-between; }
.popup li.highlight { background: rgba(128,128,128,0.5); mix-blend-mode: difference; }
.suggestions { margin-top:12px; }
.suggestions a{ text-decoration:none; margin-right:12px; }
.hidden{ display:none; }
.container { position:relative; max-width:800px; }
</style>
</head>
<body>

<h1>Simple Search</h1>

<div class="container">
  <form id="searchForm" onsubmit="return handleSearch(event);" autocomplete="off">
    <div class="search-row">
      <input id="q" type="text" placeholder="Type a search or ! to see bangs (e.g. '!a headphones' or 'amazon headphones')"/>
      <button type="submit">Go</button>
    </div>
  </form>

  <div id="popup" class="popup hidden" role="listbox" aria-live="polite">
    <ul id="popupList"></ul>
  </div>
</div>

<div id="suggestions" class="suggestions"></div>

<script id="data-json" type="application/json">
{"version":6,"bangs":[{"keyword":"a","alias":null,"defaultUrl":"https://www.amazon.com/","urls":["https://www.amazon.com/s?k=%s"],"dontEncodeQuery":false},{"keyword":"ai","alias":null,"defaultUrl":"https://duckduckgo.com/","urls":["https://duckduckgo.com/?q=%s&ia=chat&bang=true"],"dontEncodeQuery":false},{"keyword":"allrecipes","alias":null,"defaultUrl":"https://www.allrecipes.com/","urls":["https://www.allrecipes.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"allsides","alias":null,"defaultUrl":"https://www.allsides.com/","urls":["https://www.allsides.com/search/?q=%s"],"dontEncodeQuery":false},{"keyword":"archive","alias":null,"defaultUrl":"https://archive.org/","urls":["https://archive.org/search?query=%s"],"dontEncodeQuery":false},{"keyword":"bettycrocker","alias":null,"defaultUrl":"https://www.bettycrocker.com/","urls":["https://www.bettycrocker.com/search?term=%s"],"dontEncodeQuery":false},{"keyword":"bing","alias":null,"defaultUrl":"https://www.bing.com/","urls":["https://www.bing.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"brave","alias":null,"defaultUrl":"https://safe.search.brave.com/","urls":["https://safe.search.brave.com/search?q=hi"],"dontEncodeQuery":false},{"keyword":"d","alias":null,"defaultUrl":"https://www.thefreedictionary.com/","urls":["https://www.thefreedictionary.com/%s"],"dontEncodeQuery":false},{"keyword":"ddg","alias":null,"defaultUrl":"https://duckduckgo.com/","urls":["https://safe.duckduckgo.com/?q=%s"],"dontEncodeQuery":false},{"keyword":"e","alias":null,"defaultUrl":"https://www.ebay.com/","urls":["https://www.ebay.com/sch/i.html?_nkw=%s"],"dontEncodeQuery":false},{"keyword":"ebrit","alias":null,"defaultUrl":"https://www.britannica.com/","urls":["https://www.britannica.com/search?query=%s"],"dontEncodeQuery":false},{"keyword":"food","alias":null,"defaultUrl":"https://www.food.com/","urls":["https://www.food.com/search/%s"],"dontEncodeQuery":false},{"keyword":"g","alias":null,"defaultUrl":"https://www.google.com/","urls":["https://www.google.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"git","alias":null,"defaultUrl":"https://github.com/","urls":["https://github.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"github","alias":"git","defaultUrl":"","urls":[],"dontEncodeQuery":false},{"keyword":"grok","alias":null,"defaultUrl":"https://grok.com/","urls":["https://grok.com/?q=%s"],"dontEncodeQuery":false},{"keyword":"grokipedia","alias":null,"defaultUrl":"https://grokipedia.com/","urls":["https://grokipedia.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"homedepot","alias":null,"defaultUrl":"https://www.homedepot.com/","urls":["https://www.homedepot.com/s/%s"],"dontEncodeQuery":false},{"keyword":"image","alias":null,"defaultUrl":"https://duckduckgo.com/","urls":["https://safe.duckduckgo.com/?q=%s&ia=images&iax=images"],"dontEncodeQuery":false},{"keyword":"libby","alias":null,"defaultUrl":"https://libbyapp.com/","urls":["https://libbyapp.com/library/reads/search/query-%s/page-1"],"dontEncodeQuery":false},{"keyword":"makerworld","alias":null,"defaultUrl":"https://makerworld.com/","urls":["https://makerworld.com/en/search/models?keyword=%s"],"dontEncodeQuery":false},{"keyword":"maps","alias":null,"defaultUrl":"https://www.google.com/maps","urls":["https://www.google.com/maps/search/%s"],"dontEncodeQuery":false},{"keyword":"perplexity","alias":null,"defaultUrl":"https://www.perplexity.ai/","urls":["https://www.perplexity.ai/?q=linux"],"dontEncodeQuery":false},{"keyword":"pip","alias":null,"defaultUrl":"https://pypi.org/","urls":["https://pypi.org/search/?q=%s"],"dontEncodeQuery":false},{"keyword":"printables","alias":null,"defaultUrl":"https://www.printables.com/","urls":["https://www.printables.com/search/models?q=%d"],"dontEncodeQuery":false},{"keyword":"python","alias":null,"defaultUrl":"https://docs.python.org/","urls":["https://docs.python.org/3/search.html?q=%s"],"dontEncodeQuery":false},{"keyword":"seriouseats","alias":null,"defaultUrl":"https://www.seriouseats.com/","urls":["https://www.seriouseats.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"simplyrecipes","alias":null,"defaultUrl":"https://www.simplyrecipes.com/","urls":["https://www.simplyrecipes.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"so","alias":"stackoverflow","defaultUrl":"","urls":[],"dontEncodeQuery":false},{"keyword":"space","alias":null,"defaultUrl":"https://www.space.com/","urls":["https://www.space.com/search?searchTerm=%s"],"dontEncodeQuery":false},{"keyword":"stackexchange","alias":null,"defaultUrl":"https://stackexchange.com/","urls":["https://stackexchange.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"stackoverflow","alias":null,"defaultUrl":"https://stackoverflow.com/","urls":["https://stackoverflow.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"thesaurus","alias":null,"defaultUrl":"https://www.thesaurus.com/","urls":["https://www.thesaurus.com/browse/%s"],"dontEncodeQuery":false},{"keyword":"thing","alias":null,"defaultUrl":"https://www.thingiverse.com/","urls":["https://www.thingiverse.com/search?q=%s"],"dontEncodeQuery":false},{"keyword":"tubi","alias":null,"defaultUrl":"https://tubitv.com/","urls":["https://tubitv.com/search/%s"],"dontEncodeQuery":false},{"keyword":"ups","alias":null,"defaultUrl":"https://www.ups.com/","urls":["https://www.ups.com/track?tracknum=%s"],"dontEncodeQuery":false},{"keyword":"usps","alias":null,"defaultUrl":"https://tools.usps.com/","urls":["https://tools.usps.com/go/TrackConfirmAction?qtc_tLabels1=%s"],"dontEncodeQuery":false},{"keyword":"w","alias":"wa","defaultUrl":"","urls":[],"dontEncodeQuery":false},{"keyword":"wa","alias":null,"defaultUrl":"https://www.wolframalpha.com/","urls":["https://www.wolframalpha.com/input/?i=%s"],"dontEncodeQuery":false},{"keyword":"yt","alias":null,"defaultUrl":"https://www.youtube.com/","urls":["https://www.youtube.com/results?search_query=%s"],"dontEncodeQuery":false}]}
</script>

<script>
const bangsJson = JSON.parse(document.getElementById('data-json').textContent);

/* Helpers */
function extractSiteName(url) {
  try {
    const u = new URL(url);
    const parts = u.hostname.split('.');
    return parts[parts.length - 2] || u.hostname;
  } catch (e) { return url; }
}

let bangIndex = Object.fromEntries(bangsJson.bangs.map(e => [e.keyword, e]));
bangIndex = Object.fromEntries(bangsJson.bangs.map(e => {
  b = bangIndex[e.alias || e.keyword]
  const tpl = (b.urls && b.urls[0]) || b.defaultUrl;
  const site = tpl ? extractSiteName(tpl).toLowerCase(): '';
  return [ e.keyword, { keyword: e.keyword, template: tpl, site: site, dontEncode: !!b.dontEncodeQuery }];
}));
const bangs = Object.values(bangIndex);

function buildUrl(template, q, dontEncode) {
  const encoded = dontEncode ? q : encodeURIComponent(q);
  return template.includes('%s') ? template.replace('%s', encoded) : template;
}

/* Popup logic */
const input = document.getElementById('q');
const popup = document.getElementById('popup');
const popupList = document.getElementById('popupList');
let visible = false;
let filtered = [];
let highlightIndex = -1;

function showPopup() {
  popup.classList.remove('hidden');
  visible = true;
}
function hidePopup() {
  popup.classList.add('hidden');
  visible = false;
  highlightIndex = -1;
}
function renderPopup(filter, final=true) {
  if(typeof filter === 'string') {
    const f = filter.toLowerCase();
    filtered = bangs.filter(b => b.keyword.startsWith(f));
  } else {
    filtered = bangs.filter(b => filter.includes(b.keyword));
  }
  popupList.innerHTML = '';
  if (filtered.length === 0) {
    const li = document.createElement('li');
    li.textContent = 'No bangs match';
    li.className = 'no-match';
    popupList.appendChild(li);
    highlightIndex = -1;
    return;
  }
  filtered.forEach((b, i) => {
    const li = document.createElement('li');
    li.tabIndex = -1;
    li.dataset.index = i;
    li.innerHTML = `<span><strong>!${b.keyword}</strong></span><span style="opacity:.7">${b.site}</span>`;
    li.addEventListener('click', () => applyBangAtCursor(b, true, final));
    popupList.appendChild(li);
  });
  updateHighlight(false);
}

function updateHighlight(update) {
  Array.from(popupList.children).forEach((li, i) => {
    li.classList.toggle('highlight', i === highlightIndex);
  });
  if(update && highlightIndex >= 0) {
  applyBangAtCursor(filtered[highlightIndex], false);
  }
}

/* When user types */
input.addEventListener('input', (e) => {
  const val = input.value;
  const cursor = input.selectionStart;
  const before = val.slice(0, cursor);
  // detect last token starting with "!"
  const m = /(^|\s)(![\w-]*)$/.exec(before);
  if (m) {
    const token = m[2].slice(1); // without !
    renderPopup(token.toLowerCase());
    showPopup();
    positionPopup();
  } else {
    hidePopup();
  }
});

/* keyboard nav */
input.addEventListener('keydown', (e) => {
  if (!visible) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); if (filtered.length) { highlightIndex = Math.min(filtered.length-1, highlightIndex+1); updateHighlight(true); } }
  else if (e.key === 'ArrowUp') { e.preventDefault(); if (filtered.length) { highlightIndex = Math.max(0, highlightIndex-1); updateHighlight(true); } }
  else if (e.key === 'Enter') {
    // apply highlighted bang if popup visible and an item highlighted
    if (highlightIndex >= 0 && filtered[highlightIndex]) {
      e.preventDefault();
      setTimeout(() => handleSearch());
    }
  } else if (e.key === 'Escape') {
    hidePopup();
  }
});

/* Position popup under input (basic) */
function positionPopup() {
  const rect = input.getBoundingClientRect();
  popup.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  popup.style.left = (rect.left + window.scrollX) + 'px';
  popup.style.width = rect.width + 'px';
}

/* Replace the bang token in the input with the selected bang keyword (keeping rest) and redirect */
function applyBangAtCursor(bang, done, final = false) {
//  if (input.value.includes('!')) { return }
  // replace the last !token in the input with '!keyword' and submit
  const val = input.value;
  const cursor = input.selectionStart;
  const before = val.slice(0, cursor);
  const after = val.slice(cursor);
  const m = /(^|\s)(![\w-]*)$/.exec(before);
  if (!m) {
    if (final) {
      input.value = '!' + bang.keyword + ' ' + input.value;
      setTimeout(() => handleSearch());
    }
    return;
  }
  const prefix = before.slice(0, m.index + (m[1] ? 1 : 0)); // keep leading space if present
  const newVal = prefix + '!' + bang.keyword + (after.startsWith(' ') ? after : (after ? ' ' + after : ''));
  input.value = newVal.trimStart();
  if(done) {
    input.value += ' ';
    hidePopup();
    input.focus();
  }
  if(final) {
    setTimeout(() => handleSearch());
  }
}

/* Main search handler */
function handleSearch(e) {
  if (e) e.preventDefault();
  const raw = input.value.trim();
  if (!raw) return false;
  return handleRawSearch(raw);
}

function handleRawSearch(raw) {
  const parts = raw.split(/\s+/);
  const first = parts[0];
  let bangMatch = null;
  if (first.startsWith('!')) {
    const key = first.slice(1).toLowerCase();
    if (bangIndex[key]) bangMatch = { entry: bangIndex[key], remaining: parts.slice(1).join(' ') };
  }
  // detect site-name as first word
  let siteMatch = null;
  const firstWord = parts[0].toLowerCase();
  // find by site
  const siteEntry = bangs.find(b => b.site === firstWord);
  if (siteEntry) siteMatch = { entry: siteEntry, remaining: parts.slice(1).join(' ') };

  let chosen = null;
  if (bangMatch) chosen = { ...bangMatch.entry, q: (bangMatch.remaining || '') };
  else if (siteMatch) chosen = { ...siteMatch.entry, q: (siteMatch.remaining || '') };

  if (chosen) {
    const tpl = chosen.template;
    const hasPlaceholder = tpl.includes('%s');
    const qpart = chosen.q || '';
    const target = hasPlaceholder ? buildUrl(tpl, qpart, chosen.dontEncode) : tpl;
    window.location.href = target;
    return false;
  }
  if (!input.value) { input.value = raw; }

  renderSuggestions(raw);
  return false;
}

/* Suggestions: same rules as before */
function renderSuggestions(rawQuery) {
  const words = rawQuery.trim().split(/\s+/);
  const oneWord = words.length === 1;

  let forList = [];
  if (rawQuery.match(/^(find) /gi)) {
    forList = ['ddg', 'g'];
  } else if (rawQuery.match(/^(how many) /gi)) {
    forList = ['wa'];
  } else if (rawQuery.match(/^(what|when|why|where|do|how) /gi) || rawQuery.endsWith('?')) {
    forList = ['grok', 'ai'];
  } else if (rawQuery.includes('recipe')) {
    forList = ['allrecipes', 'bettycrocker', 'food', 'simplyrecipes', 'ai'];
  } else if (oneWord) {
    forList = ['dictionary', 'ebrit', 'grokipedia'];
  } else {
    forList = ['ebrit', 'ai', 'grokipedia', 'ddg', 'brave'];
  }
  renderPopup(forList);
  showPopup();
  positionPopup();
}

/* Close popup when clicking outside */
document.addEventListener('click', (e) => {
  if (!popup.contains(e.target) && e.target !== input) hidePopup();
});

/* Reposition popup on resize/scroll */
window.addEventListener('resize', () => { if (visible) positionPopup(); });
window.addEventListener('scroll', () => { if (visible) positionPopup(); });

const query = new URLSearchParams(window.location.search);

if (query.has('q')) {
  handleRawSearch(query.get('q'));
}

</script>
</body>
</html>
