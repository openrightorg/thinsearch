<!doctype html>
<!-- This single‑file static page provides a UI to search based on typed or selected bangs defined with json. When no bang is selected, simple string matching is used to offer specific site searches. -->
<html lang="en">
<head>
<meta name="color-scheme" content="light dark">
<meta charset="utf-8" />
<title>Simple Search</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; margin: 24px; }
.search-row { max-width:800px; display:flex; gap:8px; align-items:center; }
input[type="text"]{ flex:1; padding:10px; font-size:16px; }
button{ padding:10px 12px; }
.popup { border: 1px solid; z-index: 1000; }
.popup ul { list-style:none; margin:0; padding:0; max-height:240px; overflow:auto; }
.popup li { padding:8px 12px; border-bottom:1px solid #f1f1f1; cursor:pointer; display:flex; justify-content:space-between; }
.popup li.highlight { background: rgba(128,128,128,0.5); mix-blend-mode: difference; }
.suggestions { margin-top:12px; }
.suggestions a{ text-decoration:none; margin-right:12px; }
.hidden{ display:none; }
.container { position:relative; max-width:800px; }
</style>
</head>
<body>

<h1>Simple Search</h1>

<div class="container">
  <form id="searchForm" onsubmit="return handleSearch(event);">
    <div class="search-row">
      <input id="q" type="text" placeholder="Type a search or ! to see bangs (e.g. '!a headphones' or 'amazon headphones')"/>
      <button type="submit">Go</button>
    </div>
  </form>

  <div id="popup" class="popup hidden" role="listbox" aria-live="polite">
    <ul id="popupList"></ul>
  </div>
</div>

<div id="suggestions" class="suggestions"></div>

<script id="data-json" type="application/json">
{"version":6,"bangs":[{"keyword":"amazon","name":"Amazon.com","url":"https://www.amazon.com/s?k=%s"},{"keyword":"a","alias":"amazon"},{"keyword":"ai","url":"https://duckduckgo.com/?q=%s&ia=chat&bang=true"},{"keyword":"allrecipes","name":"allrecipes","url":"https://www.allrecipes.com/search?q=%s"},{"keyword":"allsides","name":"AllSides","url":"https://www.allsides.com/search/?q=%s"},{"keyword":"archive","name":"Archive.org","url":"https://archive.org/search?query=%s"},{"keyword":"bettycrocker","name":"Betty Crocker","url":"https://www.bettycrocker.com/search?term=%s"},{"keyword":"bing","url":"https://www.bing.com/search?q=%s"},{"keyword":"brave","url":"https://safe.search.brave.com/search?q=hi"},{"keyword":"dictionary","name":"The Free Dictionary","url":"https://www.thefreedictionary.com/%s"},{"keyword":"d","alias":"dictionary"},{"keyword":"ddg","name":"DuckDuckGo","url":"https://safe.duckduckgo.com/?q=%s"},{"keyword":"e","url":"https://www.ebay.com/sch/i.html?_nkw=%s"},{"keyword":"ebrit","url":"https://www.britannica.com/search?query=%s"},{"keyword":"food","url":"https://www.food.com/search/%s"},{"keyword":"g","url":"https://www.google.com/search?q=%s"},{"keyword":"git","url":"https://github.com/search?q=%s"},{"keyword":"github","alias":"git"},{"keyword":"grok","url":"https://grok.com/?q=%s"},{"keyword":"grokipedia","url":"https://grokipedia.com/search?q=%s"},{"keyword":"homedepot","url":"https://www.homedepot.com/s/%s"},{"keyword":"image","url":"https://safe.duckduckgo.com/?q=%s&ia=images&iax=images"},{"keyword":"libby","url":"https://libbyapp.com/library/reads/search/query-%s/page-1"},{"keyword":"makerworld","url":"https://makerworld.com/en/search/models?keyword=%s"},{"keyword":"maps","url":"https://www.google.com/maps/search/%s"},{"keyword":"perplexity","url":"https://www.perplexity.ai/?q=linux"},{"keyword":"pip","url":"https://pypi.org/search/?q=%s"},{"keyword":"printables","url":"https://www.printables.com/search/models?q=%d"},{"keyword":"python","url":"https://docs.python.org/3/search.html?q=%s"},{"keyword":"seriouseats","url":"https://www.seriouseats.com/search?q=%s"},{"keyword":"simplyrecipes","url":"https://www.simplyrecipes.com/search?q=%s"},{"keyword":"so","alias":"stackoverflow"},{"keyword":"space","url":"https://www.space.com/search?searchTerm=%s"},{"keyword":"stackexchange","url":"https://stackexchange.com/search?q=%s"},{"keyword":"stackoverflow","url":"https://stackoverflow.com/search?q=%s"},{"keyword":"thesaurus","url":"https://www.thesaurus.com/browse/%s"},{"keyword":"thing","url":"https://www.thingiverse.com/search?q=%s"},{"keyword":"tubi","url":"https://tubitv.com/search/%s"},{"keyword":"ups","url":"https://www.ups.com/track?tracknum=%s"},{"keyword":"usps","url":"https://tools.usps.com/go/TrackConfirmAction?qtc_tLabels1=%s"},{"keyword":"w","alias":"wa"},{"keyword":"wa","url":"https://www.wolframalpha.com/input/?i=%s"},{"keyword":"yt","url":"https://www.youtube.com/results?search_query=%s"}]}
</script>

<script>
const bangsJson = JSON.parse(document.getElementById('data-json').textContent);

function extractSiteName(url) {
  var name;
  try {
    const u = new URL(url);
    const parts = u.hostname.split('.');
    name = parts[parts.length - 2] || u.hostname;
  } catch (e) {
    name = url;
  }
  return (name && String(name[0]).toUpperCase() + String(name).slice(1).toLowerCase()) || "";
}

let bangIndex = Object.fromEntries(bangsJson.bangs.map(e => [e.keyword, e]));
bangIndex = Object.fromEntries(bangsJson.bangs.map(e => {
  b = bangIndex[e.alias || e.keyword]
  const tpl = b.url;
  const site = b.name || extractSiteName(tpl);
  return [ e.keyword, { keyword: e.keyword, template: tpl, site: site }];
}));
const bangs = Object.values(bangIndex);

function buildUrl(template, q) {
  const encoded = encodeURIComponent(q);
  return template.includes('%s') ? template.replace('%s', encoded) : template;
}

/* Popup logic */
const input = document.getElementById('q');
const popup = document.getElementById('popup');
const popupList = document.getElementById('popupList');
let visible = false;
let filtered = [];
let highlightIndex = 0;

function showPopup() {
  popup.classList.remove('hidden');
  visible = true;
}
function hidePopup() {
  popup.classList.add('hidden');
  visible = false;
  highlightIndex = -1;
  filtered = [];
}
function renderPopup(filter, final=true) {
  if(typeof filter === 'string') {
    const f = filter.toLowerCase();
    filtered = bangs.filter(b => b.keyword.startsWith(f));
  } else {
    filtered = filter.map(k => bangIndex[k]);
  }
  popupList.innerHTML = '';
  if (filtered.length === 0) {
    const li = document.createElement('li');
    li.textContent = 'No bangs match';
    li.className = 'no-match';
    popupList.appendChild(li);
    highlightIndex = -1;
    return;
  }
  highlightIndex = 0;
  for (const [i, b] of filtered.entries()) {
    const li = document.createElement('li');
    li.tabIndex = -1;
    li.dataset.index = i;
    li.innerHTML = `<span><strong>!${b.keyword}</strong></span><span style="opacity:.7">${b.site}</span>`;
    li.addEventListener('click', () => applyBangAtCursor(b, true, final));
    popupList.appendChild(li);
  }
  updateHighlight(false);
}

function updateHighlight(update) {
  Array.from(popupList.children).forEach((li, i) => {
    li.classList.toggle('highlight', i === highlightIndex);
  });
  if(update && highlightIndex >= 0) {
  applyBangAtCursor(filtered[highlightIndex], false);
  }
}

/* When user types */
input.addEventListener('input', (e) => {
  const val = input.value;
  const cursor = input.selectionStart;
  const before = val.slice(0, cursor);
  // detect last token starting with "!"
  const m = /(^|\s)(![\w-]*)$/.exec(before);
  if (m) {
    const token = m[2].slice(1); // without !
    renderPopup(token.toLowerCase());
    showPopup();
    positionPopup();
  } else {
    hidePopup();
  }
});

/* keyboard nav */
input.addEventListener('keydown', (e) => {
  if (!visible) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); if (filtered.length) { highlightIndex = Math.min(filtered.length-1, highlightIndex+1); updateHighlight(true); } }
  else if (e.key === 'ArrowUp') { e.preventDefault(); if (filtered.length) { highlightIndex = Math.max(0, highlightIndex-1); updateHighlight(true); } }
  else if (e.key === 'Enter') {
    // apply highlighted bang if popup visible and an item highlighted
    //if (highlightIndex >= 0 && filtered[highlightIndex]) {
    if (filtered.length > 0) {
      e.preventDefault();
      setTimeout(() => handleSearch());
    }
  } else if (e.key === 'Escape') {
    hidePopup();
  }
});

/* Position popup under input (basic) */
function positionPopup() {
  const rect = input.getBoundingClientRect();
  popup.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  popup.style.left = (rect.left + window.scrollX) + 'px';
  popup.style.width = rect.width + 'px';
}

/* Replace the bang token in the input with the selected bang keyword (keeping rest) and redirect */
function applyBangAtCursor(bang, done, final = false) {
//  if (input.value.includes('!')) { return }
  // replace the last !token in the input with '!keyword' and submit
  const val = input.value;
  const cursor = input.selectionStart;
  const before = val.slice(0, cursor);
  const after = val.slice(cursor);
  const m = /(^|\s)(![\w-]*)$/.exec(before);
  if (!m) {
    if (final) {
      input.value = '!' + bang.keyword + ' ' + input.value;
      setTimeout(() => handleSearch());
    }
    return;
  }
  const prefix = before.slice(0, m.index + (m[1] ? 1 : 0)); // keep leading space if present
  const newVal = prefix + '!' + bang.keyword + (after.startsWith(' ') ? after : (after ? ' ' + after : ''));
  input.value = newVal.trimStart();
  if(done) {
    input.value += ' ';
    hidePopup();
    input.focus();
  }
  if(final) {
    setTimeout(() => handleSearch());
  }
}

/* Main search handler */
function handleSearch(e) {
  if (e) e.preventDefault();
  const raw = input.value.trim();
  if (!raw) return false;
  return handleRawSearch(raw);
}

function handleRawSearch(raw) {
  const parts = raw.split(/\s+/);
  const first = parts[0];
  let bangMatch = null;
  if (first.startsWith('!')) {
    const key = first.slice(1).toLowerCase();
    if (bangIndex[key]) bangMatch = { entry: bangIndex[key], remaining: parts.slice(1).join(' ') };
  }
  // detect site-name as first word
  let siteMatch = null;
  const firstWord = parts[0].toLowerCase();
  // find by site
  const siteEntry = bangs.find(b => b.site === firstWord);
  if (siteEntry) siteMatch = { entry: siteEntry, remaining: parts.slice(1).join(' ') };

  let chosen = null;
  if (bangMatch) chosen = { ...bangMatch.entry, q: (bangMatch.remaining || '') };
  else if (siteMatch) chosen = { ...siteMatch.entry, q: (siteMatch.remaining || '') };

  if (raw && filtered.length && !chosen) {
    entry = filtered[highlightIndex >= 0 && highlightIndex < filtered.length ? highlightIndex : 0];
    chosen = { ...entry, q: raw};
  }

  if (chosen) {
    const tpl = chosen.template;
    const hasPlaceholder = tpl.includes('%s');
    const qpart = chosen.q || '';
    const target = hasPlaceholder ? buildUrl(tpl, qpart, chosen.dontEncode) : tpl;
    window.location.href = target;
    return false;
  }
  if (!input.value) { input.value = raw; }

  renderSuggestions(raw);
  return false;
}

/* Suggestions: same rules as before */
function renderSuggestions(rawQuery) {
  const words = rawQuery.trim().split(/\s+/);
  const oneWord = words.length === 1;

  let forList = [];
  if (rawQuery.match(/^(find) /gi)) {
    forList = ['ddg', 'g'];
  } else if (rawQuery.match(/^(how many) /gi)) {
    forList = ['wa'];
  } else if (rawQuery.match(/^(what|when|why|where|do|how) /gi) || rawQuery.endsWith('?')) {
    forList = ['grok', 'ai'];
  } else if (rawQuery.includes('recipe')) {
    forList = ['allrecipes', 'bettycrocker', 'food', 'simplyrecipes', 'ai'];
  } else if (oneWord) {
    forList = ['dictionary', 'ebrit', 'grokipedia'];
  } else {
    forList = ['ebrit', 'ai', 'grokipedia', 'ddg', 'brave'];
  }
  renderPopup(forList);
  showPopup();
  positionPopup();
}

/* Close popup when clicking outside */
document.addEventListener('click', (e) => {
  if (!popup.contains(e.target) && e.target !== input) hidePopup();
});

/* Reposition popup on resize/scroll */
window.addEventListener('resize', () => { if (visible) positionPopup(); });
window.addEventListener('scroll', () => { if (visible) positionPopup(); });

const query = new URLSearchParams(window.location.search);

if (query.has('q')) {
  handleRawSearch(query.get('q'));
}

</script>
</body>
</html>
